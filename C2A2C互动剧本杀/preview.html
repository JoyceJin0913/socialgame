<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>《重生之贵女难求》C2A2C互动文游 v5.0 · 可玩版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #14141f;
  --bg-card: #1a1a2e;
  --bg-card-hover: #222240;
  --bg-bubble-self: #2d4a3e;
  --bg-bubble-npc: #252538;
  --text-primary: #e8e6e3;
  --text-secondary: #9a9aab;
  --accent-gold: #c9a96e;
  --accent-red: #c45c5c;
  --accent-blue: #6b8cae;
  --accent-green: #4a9c6d;
  --accent-purple: #9b6bcb;
  --hint-bg: rgba(201,169,110,0.12);
  --hint-border: rgba(201,169,110,0.35);
  --choice-bg: #1e1e32;
  --choice-border: #2a2a45;
  --choice-hover: #282842;
  --tag-default: #6b8cae;
  --tag-warm: #c45c5c;
  --tag-cool: #5c9c9c;
  --tag-gold: #c9a96e;
  --tag-dark: #8b7355;
  --gradient-gold: linear-gradient(135deg, #c9a96e 0%, #e8d5a3 50%, #c9a96e 100%);
  --shadow-glow: 0 0 20px rgba(201,169,110,0.3);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}
body {
  font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary); color: var(--text-primary);
  height: 100vh; overflow: hidden; display: flex; justify-content: center;
}
.app-container {
  width: 100%; max-width: 430px; height: 100vh;
  display: flex; flex-direction: column; position: relative;
  background: var(--bg-primary); overflow: hidden;
}

/* ===== SCREEN SYSTEM ===== */
.screen {
  display: none; width: 100%; height: 100%;
  flex-direction: column; overflow-y: auto; overflow-x: hidden;
  animation: fadeIn 0.4s ease;
}
.screen.active { display: flex; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
@keyframes slideUp { from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)} }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.6} }
@keyframes shimmer { 0%{background-position:-200%0}100%{background-position:200%0} }
@keyframes typingDots { 0%,20%{content:'.'}40%{content:'..'}60%{content:'...'}100%{content:''} }

/* ===== HEADER ===== */
.game-header {
  padding: 14px 16px; background: linear-gradient(180deg, rgba(10,10,15,0.98) 0%, transparent 100%);
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: blur(10px);
}
.header-left button {
  background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; padding: 4px;
}
.header-center { text-align: center; }
.header-title { font-size: 13px; font-weight: 700; color: var(--accent-gold); }
.header-subtitle { font-size: 11px; color: var(--text-secondary); }
.header-right { display: flex; gap: 12px; align-items: center; }
.header-icon-btn { background: none; border: none; color: var(--text-secondary); font-size: 16px; cursor: pointer; }

/* ===== PARAMETER BAR (五大维度分类展示) ===== */
.param-bar {
  display: flex; gap: 6px; padding: 6px 12px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  background: rgba(20,20,31,0.9);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  scrollbar-width: none; flex-wrap: nowrap;
}
.param-bar::-webkit-scrollbar { display: none; }

/* 分类组 */
.param-group {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 8px; border-radius: 10px; flex-shrink: 0;
  background: rgba(26,26,46,0.6); border: 1px solid rgba(255,255,255,0.05);
}
.param-group-label {
  font-size: 9px; color: var(--text-secondary); font-weight: 600;
  letter-spacing: 0.5px; white-space: nowrap; opacity: 0.7;
}

/* 参数芯片 */
.param-chip {
  display: flex; align-items: center; gap: 3px;
  padding: 3px 7px; border-radius: 12px; font-size: 10px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
  white-space: nowrap; transition: all 0.25s ease;
}
.param-chip:hover { background: rgba(255,255,255,0.06); }
.param-chip .p-icon { font-size: 11px; }
.param-chip .p-name { color: var(--text-secondary); font-size: 9px; }
.param-chip .p-val { 
  color: var(--accent-gold); font-weight: 700; min-width: 18px; 
  text-align: right; font-size: 10px; 
}
.param-chip.p-up .p-val { color: var(--accent-green); animation: pulse 0.5s ease 3; }
.param-chip.p-down .p-val { color: var(--accent-red); animation: pulse 0.5s ease 3; }
.param-chip.negative-value .p-val { color: var(--accent-red); }

/* 分类颜色标记 */
.param-group[data-cat="affection"] { border-left: 3px solid #FF69B4; }
.param-group[data-cat="skills"] { border-left: 3px solid #4169E1; }

/* ===== CHAT AREA ===== */
.chat-area {
  flex: 1; overflow-y: auto; padding: 16px;
  scroll-behavior: smooth; display: flex; flex-direction: column; gap: 16px;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* Narrative Block */
.narrative-block {
  line-height: 1.85; font-size: 14.5px; color: var(--text-primary);
  padding: 16px; background: linear-gradient(135deg, rgba(201,169,110,0.06) 0%, rgba(107,140,174,0.04) 100%);
  border-radius: var(--radius-md); border-left: 3px solid var(--accent-gold);
  position: relative;
}
.narrative-block b, .narrative-block strong { color: var(--accent-gold); }

/* Dialogue Bubbles */
.dialogue-bubble { display: flex; gap: 10px; animation: slideUp 0.35s ease; }
.dialogue-bubble.self { flex-direction: row-reverse; }
.bubble-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  background: var(--bg-card); border: 1px solid rgba(255,255,255,0.08);
}
.dialogue-bubble.self .bubble-avatar { background: var(--bg-bubble-self); }
.bubble-content { max-width: 75%; }
.bubble-name { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
.dialogue-bubble.self .bubble-name { text-align: right; }
.bubble-body {
  padding: 10px 14px; border-radius: var(--radius-md);
  font-size: 14px; line-height: 1.65;
  background: var(--bg-bubble-npc); position: relative;
}
.dialogue-bubble.self .bubble-body { background: var(--bg-bubble-self); }

/* Card Popup in dialogue */
.card-popup {
  margin-top: 8px; padding: 12px; border-radius: var(--radius-sm);
  font-size: 12px; line-height: 1.7; border-left: 3px solid;
  background: rgba(0,0,0,0.25);
}
.card-popup.roleCard { border-color: var(--accent-blue); }
.card-popup.warningCard { border-color: var(--accent-red); background: rgba(196,92,92,0.08); }
.card-popup.itemCard { border-color: var(--accent-purple); }
.card-popup.relationMap { border-color: var(--accent-green); }
.card-popup strong:first-child { font-size: 13px; display: block; margin-bottom: 4px; color: var(--accent-gold); }

/* Hint Block */
.hint-block {
  display: flex; gap: 10px; padding: 14px; border-radius: var(--radius-md);
  background: var(--hint-bg); border: 1px solid var(--hint-border);
  animation: slideUp 0.35s ease 0.1s both;
}
.hint-icon { font-size: 22px; flex-shrink: 0; }
.hint-content .hint-label { font-size: 12px; color: var(--accent-gold); font-weight: 600; margin-bottom: 4px; }
.hint-text { font-size: 13px; line-height: 1.7; color: var(--text-secondary); }

/* Inner Monologue */
.inner-monologue {
  margin: 4px 0; padding: 12px 16px; border-radius: var(--radius-sm);
  font-style: italic; font-size: 13.5px; line-height: 1.75;
  color: #c9b896; background: rgba(201,169,110,0.05);
  border-left: 2px dashed rgba(201,169,110,0.3);
}

/* Narrative Transition */
.narrative-transition {
  text-align: center; padding: 16px; margin: 8px 0;
  font-style: italic; line-height: 1.85; color: #b8a88e;
  background: radial-gradient(ellipse at center, rgba(139,115,85,0.1) 0%, transparent 70%);
  border-radius: var(--radius-md);
}
.narrative-transition.suspense::after { content: ''; }

/* ===== CHOICE CARDS ===== */
.choice-section { display: flex; flex-direction: column; gap: 10px; animation: slideUp 0.4s ease 0.2s both; }
.choice-section-title { font-size: 15px; font-weight: 700; color: var(--accent-gold); text-align: center; }
.choice-btn {
  width: 100%; padding: 14px 16px; border-radius: var(--radius-md);
  background: var(--choice-bg); border: 1px solid var(--choice-border);
  cursor: pointer; text-align: left; transition: all 0.25s ease;
  display: flex; flex-direction: column; gap: 6px;
}
.choice-btn:hover:not(:disabled) { background: var(--choice-hover); border-color: var(--accent-gold); transform: translateX(4px); }
.choice-btn:active:not(:disabled) { transform: scale(0.98); }
.choice-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.choice-btn.recommended { border-color: var(--accent-gold); background: rgba(201,169,110,0.08); }
.choice-btn.selected { border-color: var(--accent-gold); background: rgba(74,156,109,0.12); box-shadow: inset 0 0 0 1px var(--accent-gold); }
.choice-prefix {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px; width: fit-content;
}
.choice-prefix[data-type="gold"] { background: rgba(201,169,110,0.2); color: var(--accent-gold); }
.choice-prefix[data-type="warm"] { background: rgba(196,92,92,0.2); color: var(--accent-warm); }
.choice-prefix[data-type="cool"] { background: rgba(92,156,156,0.2); color: var(--tag-cool); }
.choice-prefix[data-type="dark"] { background: rgba(139,115,85,0.2); color: var(--tag-dark); }
.choice-prefix[data-type="default"] { background: rgba(107,140,174,0.2); color: var(--tag-default); }
.choice-main-text { font-size: 14px; line-height: 1.55; color: var(--text-primary); }
.choice-effect { font-size: 11.5px; color: var(--accent-green); line-height: 1.5; }
.choice-effect .warn { color: var(--accent-red); }
.choice-lock-badge { font-size: 10.5px; color: var(--text-secondary); }

/* ===== INPUT BAR ===== */
.input-bar {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 10px 16px; background: var(--bg-secondary);
  border-top: 1px solid rgba(255,255,255,0.04); z-index: 50;
}
.input-field-wrapper {
  flex: 1; position: relative;
}
#inputField {
  width: 100%; max-height: 80px; padding: 10px 14px;
  border-radius: var(--radius-md); border: 1px solid var(--choice-border);
  background: var(--bg-card); color: var(--text-primary);
  font-size: 14px; resize: none; outline: none; line-height: 1.5;
  font-family: inherit;
}
#inputField:focus { border-color: var(--accent-gold); }
#inputField::placeholder { color: var(--text-secondary); opacity: 0.5; }
.send-btn {
  width: 40px; height: 40px; border-radius: var(--radius-md);
  background: var(--gradient-gold); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #1a1a2e; flex-shrink: 0;
  transition: transform 0.2s;
}
.send-btn:hover { transform: scale(1.08); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ===== CONSEQUENCE DISPLAY ===== */
.consequence-display {
  padding: 14px 16px; border-radius: var(--radius-md);
  background: rgba(74,156,109,0.08); border: 1px solid rgba(74,156,109,0.25);
  animation: slideUp 0.4s ease; margin: 4px 0;
}
.consequence-display .conseq-title { font-size: 13px; font-weight: 700; color: var(--accent-green); margin-bottom: 6px; }
.consequence-display .conseq-body { font-size: 13px; line-height: 1.7; color: var(--text-primary); }
.consequence-display.negative { background: rgba(196,92,92,0.06); border-color: rgba(196,92,92,0.25); }
.consequence-display.negative .conseq-title { color: var(--accent-red); }

/* Post Choice Event (memory flashback etc.) */
.post-choice-event {
  margin: 12px 0; padding: 16px; border-radius: var(--radius-md);
  background: linear-gradient(135deg, rgba(155,107,203,0.08), rgba(107,140,174,0.06));
  border: 1px solid rgba(155,107,203,0.2);
  animation: slideUp 0.5s ease 0.3s both;
}
.post-choice-event .event-title { font-size: 14px; font-weight: 700; color: var(--accent-purple); margin-bottom: 8px; }
.post-choice-event .event-body { font-size: 13px; line-height: 1.8; color: #c8c0d8; }

/* Mini Game Section */
.mini-game-section { margin: 12px 0; animation: slideUp 0.4s ease 0.3s both; }
.mini-game-header { font-size: 14px; font-weight: 700; color: var(--accent-purple); margin-bottom: 10px; }
.mini-game-options { display: flex; flex-direction: column; gap: 8px; }
.mini-game-option {
  padding: 12px 14px; border-radius: var(--radius-sm);
  background: var(--bg-card); border: 1px solid rgba(155,107,203,0.2);
  cursor: pointer; font-size: 13.5px; transition: all 0.2s;
  display: flex; align-items: center; gap: 10px;
}
.mini-game-option:hover { border-color: var(--accent-purple); background: rgba(155,107,203,0.08); }
.mg-icon { font-size: 20px; }

/* Mission Tracker */
.mission-tracker {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-radius: var(--radius-sm);
  background: rgba(201,169,110,0.04); border: 1px solid rgba(201,169,110,0.12);
  font-size: 12px;
}
.mt-current { color: var(--accent-gold); font-weight: 600; }
.mt-overall { color: var(--text-secondary); }
.mt-progress { color: var(--accent-green); font-weight: 700; }

/* Scene Overlay / Transition */
.scene-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.88); z-index: 999;
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
}
.scene-overlay.active { display: flex; animation: fadeIn 0.5s ease; }
.overlay-text { font-size: 22px; font-weight: 700; color: var(--accent-gold); text-align: center; }
.overlay-sub { font-size: 14px; color: var(--text-secondary); }

/* Typing indicator */
.typing-indicator {
  display: flex; align-items: center; gap: 6px; padding: 12px 16px;
  animation: slideUp 0.3s ease;
}
.typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-secondary); animation: bounce 1.4s infinite both; }
.typing-dot:nth-child(2) { animation-delay: 0.16s; }
.typing-dot:nth-child(3) { animation-delay: 0.32s; }
@keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1} }

/* Act Ending Report */
.act-ending-report {
  margin: 16px 0; padding: 20px; border-radius: var(--radius-lg);
  background: linear-gradient(135deg, rgba(201,169,110,0.12), rgba(107,140,174,0.08));
  border: 1px solid rgba(201,169,110,0.3); text-align: center;
  animation: slideUp 0.5s ease;
}
.aer-title { font-size: 18px; font-weight: 800; color: var(--accent-gold); margin-bottom: 8px; }
.aer-summary { font-size: 14px; color: var(--text-primary); line-height: 1.6; margin-bottom: 12px; }
.aer-next { font-size: 12.5px; color: var(--accent-blue); line-height: 1.7; }
.aer-next strong { color: var(--accent-gold); }

/* ===== ENTRY SCREEN ===== */
.entry-screen { align-items: center; justify-content: center; text-align: center; }
.cover-art {
  width: 200px; height: 280px; border-radius: var(--radius-lg);
  background: linear-gradient(135deg, #1a1a2e 0%, #2d1f3d 50%, #1a2a3e 100%);
  border: 2px solid rgba(201,169,110,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 64px; margin-bottom: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  position: relative; overflow: hidden;
}
.cover-art::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg,transparent 60%,rgba(0,0,0,0.6)); }
.entry-title { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
.entry-author { font-size: 14px; color: var(--text-secondary); margin-bottom: 4px; }
.entry-tags { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 12px 0 20px; }
.entry-tag { padding: 4px 12px; border-radius: 20px; font-size: 12px; background: var(--bg-card); color: var(--text-secondary); }
.cta-button {
  padding: 16px 48px; border-radius: 30px; font-size: 17px; font-weight: 800;
  background: var(--gradient-gold); color: #1a1a2e; border: none;
  cursor: pointer; box-shadow: var(--shadow-glow); transition: all 0.3s;
  animation: float 3s ease-in-out infinite;
}
.cta-button:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(201,169,110,0.5); }

/* ===== CHARACTER SELECT SCREEN ===== */
.char-select-screen { padding: 20px 16px; }
.char-list { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
.char-card {
  padding: 16px; border-radius: var(--radius-md); cursor: pointer;
  background: var(--bg-card); border: 2px solid transparent;
  transition: all 0.25s; display: flex; gap: 14px; align-items: center;
}
.char-card:hover { border-color: var(--accent-gold); background: var(--bg-card-hover); }
.char-card.selected { border-color: var(--accent-gold); background: rgba(201,169,110,0.08); }
.char-avatar-lg { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; background: var(--bg-secondary); flex-shrink: 0; }
.char-info h3 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
.char-info .char-title { font-size: 12px; color: var(--accent-gold); margin-bottom: 4px; }
.char-info p { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.char-difficulty { margin-left: auto; font-size: 11px; padding: 3px 8px; border-radius: 10px; background: var(--bg-secondary); }

/* ===== MODE SELECT SCREEN ===== */
.mode-screen { padding: 20px 16px; }
.mode-option {
  padding: 20px; border-radius: var(--radius-md); cursor: pointer;
  background: var(--bg-card); border: 2px solid transparent;
  margin-bottom: 12px; transition: all 0.25s;
}
.mode-option:hover { border-color: var(--accent-gold); }
.mode-option.selected { border-color: var(--accent-gold); background: rgba(201,169,110,0.08); }
.mode-option h3 { font-size: 16px; margin-bottom: 6px; }
.mode-option p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

/* ===== ENDING SCREEN ===== */
.ending-screen { padding: 20px 16px; align-items: center; }
.ending-badge { font-size: 56px; margin: 16px 0; }
.ending-title-lg { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 4px; }
.ending-subtitle-lg { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 24px; }
.fate-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; width: 100%; margin: 20px 0; }
.fate-item { padding: 12px; border-radius: var(--radius-sm); background: var(--bg-card); text-align: center; }
.fate-avatar { font-size: 28px; }
.fate-name { font-size: 13px; font-weight: 600; margin: 4px 0 2px; }
.fate-desc { font-size: 11px; color: var(--text-secondary); }
.achievement-list { width: 100%; display: flex; flex-direction: column; gap: 8px; margin: 20px 0; }
.achievement-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: var(--radius-sm); background: var(--bg-card); }
.achievement-icon { font-size: 20px; }
.achievement-info .achievement-name { font-size: 13px; font-weight: 600; }
.achievement-desc { font-size: 11px; color: var(--text-secondary); }
.achievement-lock { margin-left: auto; font-size: 12px; }
.share-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
.share-btn {
  padding: 10px 20px; border-radius: var(--radius-md);
  background: var(--bg-card); border: 1px solid var(--choice-border);
  color: var(--text-primary); font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.share-btn:hover { border-color: var(--accent-gold); }

/* Relation Graph Container */
.relation-graph-container { width: 100%; height: 250px; position: relative; margin: 16px 0; background: var(--bg-card); border-radius: var(--radius-md); }
.graph-node { position: absolute; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 2; }
.graph-node.player { box-shadow: 0 0 0 3px var(--accent-gold); }
.graph-label { position: absolute; font-size: 10px; color: var(--text-secondary); white-space: nowrap; transform: translateX(-50%); z-index: 3; }

/* Param Chart Container */
.param-chart-container { width: 100%; height: 200px; background: var(--bg-card); border-radius: var(--radius-md); padding: 12px; margin: 16px 0; }

/* Social Screen */
.social-screen { padding: 20px 16px; }
.codex-player { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: var(--radius-md); background: var(--bg-card); margin-bottom: 10px; }

/* 倒计时吸顶容器 */
.timer-sticky-container {
  position: sticky;
  top: 0;
  z-index: 15;
  display: none; /* 无倒计时时不显示 */
}
.timer-sticky-container.has-timer {
  display: block;
}

/* 倒计时容器 - 吸顶模式 */
.countdown-wrapper {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; padding: 10px 16px;
  background: linear-gradient(180deg, var(--bg-primary) 0%, rgba(20,25,35,0.97) 100%);
  border-bottom: 1px solid rgba(201,169,110,0.25);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

/* 环形进度条容器 */
.timer-ring-container {
  position: relative; width: 56px; height: 56px;
  flex-shrink: 0;
}
.timer-ring-svg {
  transform: rotate(-90deg); width: 100%; height: 100%;
}
.timer-ring-bg {
  fill: none; stroke: rgba(255,255,255,0.08);
  stroke-width: 4;
}
.timer-ring-progress {
  fill: none; stroke: var(--accent-gold);
  stroke-width: 4; stroke-linecap: round;
  transition: stroke-dashoffset 0.3s ease, stroke 0.3s ease;
  filter: drop-shadow(0 0 6px rgba(201,169,110,0.5));
}
.timer-ring-progress.warning {
  stroke: #FFA500;
  filter: drop-shadow(0 0 6px rgba(255,165,0,0.5));
}
.timer-ring-progress.danger {
  stroke: var(--accent-red);
  filter: drop-shadow(0 0 6px rgba(196,92,92,0.7));
  animation: timerPulse 0.8s ease infinite;
}
@keyframes timerPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* 环形中心文字 */
.timer-ring-text {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center; line-height: 1;
}
.timer-seconds {
  font-size: 18px; font-weight: 800; color: var(--text-primary);
  font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
  letter-spacing: -1px;
}
.timer-label {
  font-size: 9px; color: var(--text-secondary); margin-top: 2px;
  text-transform: uppercase; letter-spacing: 0.5px;
}

/* 倒计时信息区 */
.timer-info { flex: 1; min-width: 0; }
.timer-title {
  font-size: 13px; font-weight: 700; color: var(--accent-gold);
  margin-bottom: 4px;
}
.timer-hint {
  font-size: 11.5px; color: var(--text-secondary); line-height: 1.55;
}
.timer-hint .highlight { color: var(--accent-red); font-weight: 600; }

/* 玩家状态指示器（多人模式） */
.players-indicator {
  display: flex; align-items: center; gap: 6px; margin-top: 6px;
  padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05);
}
.player-dot {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  border: 2px solid transparent; transition: all 0.25s ease;
}
.player-dot.ready { 
  border-color: var(--accent-green); 
  background: rgba(74,156,109,0.15); 
  color: var(--accent-green);
}
.player-dot.waiting { 
  border-color: var(--text-secondary); 
  background: rgba(255,255,255,0.03); 
  color: var(--text-secondary);
}
.player-dot.self { 
  border-color: var(--accent-gold); 
  box-shadow: 0 0 8px rgba(201,169,110,0.4);
}
.player-dot.timeout {
  border-color: var(--accent-red);
  background: rgba(196,92,92,0.2);
  color: var(--accent-red);
  animation: shakeTimer 0.4s ease infinite;
}
@keyframes shakeTimer {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-2px); }
  75% { transform: translateX(2px); }
}

/* 全屏倒计时遮罩（紧急场景） */
.countdown-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 9998;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  animation: fadeIn 0.3s ease;
}
.countdown-overlay .timer-ring-container {
  width: 120px; height: 120px;
}
.countdown-overlay .timer-seconds {
  font-size: 36px;
}
.countdown-overlay .timer-label {
  font-size: 13px;
}
.overlay-timer-message {
  margin-top: 20px; font-size: 16px; color: var(--accent-gold);

}
.overlay-timer-subtitle {

}

/* 倒计时结束动画 */
.timer-expired {
  animation: timerExpiredShake 0.5s ease;
}
@keyframes timerExpiredShake {
  0%, 100% { transform: translateX(0) scale(1); }
  20% { transform: translateX(-8px) scale(1.02); }
  40% { transform: translateX(8px) scale(1.01); }
  60% { transform: translateX(-4px) scale(1.01); }
  80% { transform: translateX(4px) scale(1); }
}
</style>

// ⏱️ COUNTDOWN TIMER MANAGER (倒计时管理器)
// ══════════════════════════════════════

/**
 * TimerManager - 多人互动倒计时系统
 * 功能：
 * - 环形进度条倒计时显示
 * - 支持多人状态指示器
 * - 超时自动处理（默认选项/跳过）
 * - 全屏紧急倒计时模式
 */
const TimerManager = {
  // 当前倒计时实例
  _timer: null,
  _interval: null,
  _remaining: 0,
  _total: 0,
  _isRunning: false,
  
  // 配置
  config: {
    defaultDuration: 30,        // 默认30秒
    warningThreshold: 10,       // 10秒进入警告状态
    dangerThreshold: 5,         // 5秒进入危险状态
    updateInterval: 1000,       // 更新频率1秒
    ringCircumference: 157,     // 环形周长 (2 * PI * r ≈ 50 * π)
    autoSelectOnTimeout: true,  // 超时是否自动选择推荐项
    showPlayersIndicator: false,// 是否显示多人指示器
    overlayModeThreshold: 10,   // 低于此时间使用全屏模式(秒)
  },

  /**
   * 启动倒计时
   * @param {Object} options - 倒计时配置
   * @param {number|string} options.duration - 时长(秒)或 'mm:ss' 格式
   * @param {string} options.message - 提示信息
   * @param {string} options.hint - 副提示
   * @param {boolean} options.overlayMode - 是否使用全屏模式
   * @param {Array} options.players - 玩家列表 [{id, name, ready}, ...]
   * @param {Function} options.onTick - 每秒回调
   * @param {Function} options.onTimeout - 超时回调
   * @returns {HTMLElement|null} 返回创建的倒计时DOM元素
   */
  start(options = {}) {
    // 解析时长
    this._total = this.parseDuration(options.duration || this.config.defaultDuration);
    this._remaining = this._total;

    // 清理旧定时器（必须在 _isRunning=true 之前调用）
    this.stop();
    this._isRunning = true;

    // 创建UI
    const containerId = 'countdown_' + Date.now();
    const isOverlay = options.overlayMode || (this._total <= this.config.overlayModeThreshold);
    
    let element;
    if (isOverlay) {
      element = this.createOverlayTimer(containerId, options);
    } else {
      element = this.createInlineTimer(containerId, options);
    }

    // 存储回调
    this._onTimeout = options.onTimeout;
    this._onTick = options.onTick;

    // 启动定时器
    this._interval = setInterval(() => this.tick(), this.config.updateInterval);
    
    // 立即更新一次UI
    this.updateUI(containerId);

    return element;
  },

  /**
   * 解析时长格式
   * @param {number|string} duration - 时长
   * @returns {number} 秒数
   */
  parseDuration(duration) {
    if (typeof duration === 'number') return duration;
    if (typeof duration === 'string') {
      const match = duration.match(/(\d+):(\d+)/);
      if (match) {
        return parseInt(match[1]) * 60 + parseInt(match[2]);
      }
      return parseInt(duration) || this.config.defaultDuration;
    }
    return this.config.defaultDuration;
  },

  /**
   * 创建内联倒计时（嵌入选项卡）
   */
  createInlineTimer(containerId, options) {
    const playersHtml = this.buildPlayersHTML(options.players);
    
    const html = `
      <div class="countdown-wrapper" id="${containerId}">
        <div class="timer-ring-container">
          <svg class="timer-ring-svg" viewBox="0 0 56 56">
            <circle class="timer-ring-bg" cx="28" cy="28" r="25" />
            <circle class="timer-ring-progress" id="${containerId}_progress" 
              cx="28" cy="28" r="25"
              stroke-dasharray="${this.config.ringCircumference}"
              stroke-dashoffset="0" />
          </svg>
          <div class="timer-ring-text">
            <div class="timer-seconds" id="${containerId}_seconds">${this._remaining}</div>
            <div class="timer-label">剩余</div>
          </div>
        </div>
        <div class="timer-info">
          <div class="timer-title">${options.message || '⏱️ 请在时间内做出选择'}</div>
          <div class="timer-hint">${options.hint || '超时后将<span class="highlight">自动选择</span>推荐选项'}</div>
          ${playersHtml}
        </div>
      </div>`;

    // 插入到吸顶容器（幕次下方）
    const stickyContainer = $('timerStickyContainer');
    if (stickyContainer) {
      stickyContainer.innerHTML = html;
      stickyContainer.classList.add('has-timer');
    }

    return document.getElementById(containerId);
  },

  /**
   * 创建全屏倒计时（紧急场景）
   */
  createOverlayTimer(containerId, options) {
    const html = `
      <div class="countdown-overlay" id="${containerId}">
        <div class="timer-ring-container">
          <svg class="timer-ring-svg" viewBox="0 0 56 56">
            <circle class="timer-ring-bg" cx="28" cy="28" r="25" />
            <circle class="timer-ring-progress" id="${containerId}_progress" 
              cx="28" cy="28" r="25"
              stroke-dasharray="${this.config.ringCircumference}"
              stroke-dashoffset="0" />
          </svg>
          <div class="timer-ring-text">
            <div class="timer-seconds" id="${containerId}_seconds">${this._remaining}</div>
            <div class="timer-label">剩余</div>
          </div>
        </div>
        <div class="overlay-timer-message">${options.message || '⚠️ 时间紧迫！'}</div>
        <div class="overlay-timer-subtitle">${options.hint || ''}</div>
      </div>`;

    document.body.insertAdjacentHTML('beforeend', html);

    return document.getElementById(containerId);
  },

  /**
   * 构建多人玩家状态HTML
   */
  buildPlayersHTML(players) {
    if (!players || !players.length || !this.config.showPlayersIndicator) return '';
    
    const dots = players.map((p, i) => `
      <div class="player-dot ${p.ready ? 'ready' : 'waiting'} ${p.isSelf ? 'self' : ''}" 
           id="player_${p.id || i}"
           title="${p.name || `玩家${i + 1}`}">
        ${(i + 1).toString()}
      </div>
    `).join('');

    return `<div class="players-indicator">${dots}</div>`;
  },

  /**
   * 每秒更新
   */
  tick() {
    if (!this._isRunning) return;
    
    this._remaining--;

    if (this._onTick) {
      this._onTick(this._remaining, this._total);
    }

    // 更新所有活跃的倒计时UI
    document.querySelectorAll('[id^="countdown_"]').forEach(el => {
      this.updateUI(el.id);
    });

    // 超时处理
    if (this._remaining <= 0) {
      this.handleTimeout();
    }
  },

  /**
   * 更新倒计时UI
   */
  updateUI(containerId) {
    const secondsEl = $(`${containerId}_seconds`);
    const progressEl = $(`${containerId}_progress`);
    
    if (!secondsEl || !progressEl) return;

    // 更新数字
    secondsEl.textContent = Math.max(0, this._remaining);
    
    // 更新环形进度条
    const progress = this._remaining / this._total;
    const offset = this.config.ringCircumference * (1 - progress);
    progressEl.style.strokeDashoffset = offset;

    // 状态颜色切换
    progressEl.classList.remove('warning', 'danger');
    if (this._remaining <= this.config.dangerThreshold) {
      progressEl.classList.add('danger');
      secondsEl.parentElement.classList.add('timer-expired');
      setTimeout(() => secondsEl.parentElement.classList.remove('timer-expired'), 500);
    } else if (this._remaining <= this.config.warningThreshold) {
      progressEl.classList.add('warning');
    }
  },

  /**
   * 处理超时
   */
  handleTimeout() {
    this.stop();

    // 标记所有未准备玩家为超时
    document.querySelectorAll('.player-dot.waiting').forEach(dot => {
      dot.classList.remove('waiting');
      dot.classList.add('timeout');
    });

    // 执行超时回调
    if (this._onTimeout) {
      this._onTimeout();
    } else {
      console.warn('[Timer] 超时但未设置超时回调');
    }
  },

  /**
   * 停止倒计时
   */
  stop() {
    this._isRunning = false;
    if (this._interval) {
      clearInterval(this._interval);
      this._interval = null;
    }
  },

  /**
   * 销毁所有倒计时UI
   */
  destroy() {
    this.stop();
    document.querySelectorAll('[id^="countdown_"]').forEach(el => el.remove());
    const stickyContainer = $('timerStickyContainer');
    if (stickyContainer) {
      stickyContainer.innerHTML = '';
      stickyContainer.classList.remove('has-timer');
    }
    this._remaining = 0;
    this._total = 0;
  },

  /**
   * 获取当前剩余时间
   */
  getRemaining() {
    return this._remaining;
  },

  /**
   * 是否正在运行
   */
  isActive() {
    return this._isRunning && this._remaining > 0;
  },

  /**
   * 更新玩家状态（多人模式）
   * @param {string} playerId - 玩家ID
   * @param {'ready'|'waiting'|'timeout'} state - 状态
   */
  updatePlayerState(playerId, state) {
    const dot = $(`player_${playerId}`);
    if (!dot) return;
    
    dot.className = `player-dot ${state}`;
    if (dot.classList.contains('self')) {
      dot.classList.add('self');
    }
  },

  /**
   * 格式化时间显示
   * @param {number} seconds - 秒数
   * @returns {string} mm:ss 格式
   */
  formatTime(seconds) {
    const m = Math.floor(Math.abs(seconds) / 60).toString().padStart(2, '0');
    const s = (Math.abs(seconds) % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  },
};

function parseEffectPreview(effectStr) {
  // 解析效果预览字符串，返回参数变化对象
  if (!effectStr) return {};
  const changes = {};
  const regex = /([^\s|]+)\s*([+-]\d+)/g;
  let match;
  while ((match = regex.exec(effectStr)) !== null) {
    const paramName = match[1].trim();
    const value = parseInt(match[2]);
    changes[paramName] = value;
  }
  return changes;
}

function applyParameterChanges(changes) {
  Object.keys(changes).forEach(displayName => {
    const mapping = mapParamNameToKey(displayName);
    if (!mapping || !mapping.cat || !mapping.key) return;

    const { cat, key } = mapping;
    
    if (GameState.parameters[cat] && GameState.parameters[cat].hasOwnProperty(key)) {
      if (cat === 'affection') {
        // 好感度范围 0~1000
        GameState.parameters[cat][key] = Math.max(0, Math.min(1000, GameState.parameters[cat][key] + changes[displayName]));
      } else if (cat === 'skills') {
        // 技能点范围 0~100
        GameState.parameters[cat][key] = Math.max(0, Math.min(100, GameState.parameters[cat][key] + changes[displayName]));
      }
      highlightParamChange(cat, key, changes[displayName]);
    }
  });
  renderParamBar();
}

    'player_courage': { cat: 'skills', key: 'martial' },
    'darkness_value': null,
    'fu_yunxi_affection': { cat: 'affection', key: 'fu_yunxi' },
    'wei_rufeng_affection': { cat: 'affection', key: 'wei_rufeng' },
    'zhou_shi_hostility': { cat: 'affection', key: 'zhou_shi' },
    'zhuang_yushan_hostility': { cat: 'affection', key: 'zhuang_yushan' },
    'hanming_trust': { cat: 'affection', key: 'hanming' },
    'father_relation': { cat: 'affection', key: 'father' },
    'revenge_progress': null,
  };
  return mapping[name] || null;
}

function checkLockCondition(condition) {
  // 检查选项锁定条件
  if (!condition || !condition.trim()) return true;
  
  try {
    const condLower = condition.toLowerCase();
    
    // 替换参数名为实际值（支持新分类结构）
    let evalStr = condLower
      .replace(/(\w+)\s*>=\s*(\d+)/g, (_, param, val) => {
        const mapping = mapParamNameToKey(param);
        if (mapping && mapping.cat && mapping.key) {
          return `(GameState.parameters['${mapping.cat}']['${mapping.key}']||0)>=${val}`;
        }
        return `false`;
      })
      .replace(/(\w+)\s*<=\s*(\d+)/g, (_, param, val) => {
        const mapping = mapParamNameToKey(param);
        if (mapping && mapping.cat && mapping.key) {
          return `(GameState.parameters['${mapping.cat}']['${mapping.key}']||0)<=${val}`;
        }
        return `false`;
      })
      .replace(/\band\b/g, '&&')
      .replace(/\bor\b/g, '||');
    
    return eval(evalStr);
  } catch(e) {
    console.warn('条件解析失败:', condition, e);
    return true; // 解析失败时默认不锁定
  }
}

// 流式引擎状态
let _streamAbort = false;   // 是否跳过当前流
let _streaming = false;     // 是否正在流式输出

function skipStreaming() {
  _streamAbort = true;
}

// 逐字打字机输出（支持HTML标签）
async function typeText(element, fullHtml, speed = 28) {
  if (_streamAbort) { element.innerHTML = fullHtml; return; }
  _streaming = true;

  // 解析HTML：把文本和标签分开
  const tokens = []; // { type:'text'|'tag', value }
  let buf = '';
  let inTag = false;
  for (let i = 0; i < fullHtml.length; i++) {
    const ch = fullHtml[i];
    if (ch === '<') {
      if (buf) tokens.push({ type: 'text', value: buf });
      buf = '<'; inTag = true;
    } else if (ch === '>' && inTag) {
      buf += '>'; tokens.push({ type: 'tag', value: buf });
      buf = ''; inTag = false;
    } else {
      buf += ch;
    }
  }
  if (buf) tokens.push({ type: 'text', value: buf });

  // 先放一个typing-cursor span
  element.innerHTML = '<span class="typing-cursor"></span>';
  const cursor = element.querySelector('.typing-cursor');

  let builtHtml = '';
  for (const tok of tokens) {
    if (_streamAbort) { builtHtml += tok.value; continue; }
    if (tok.type === 'tag') {
      builtHtml += tok.value;
      cursor.insertAdjacentHTML('beforebegin', tok.value);
    } else {
      for (const ch of tok.value) {
        if (_streamAbort) { builtHtml += tok.value.substring(tok.value.indexOf(ch)); break; }
        builtHtml += ch;
        // 在cursor前插入字符
        const chEscaped = ch === '&' ? '&amp;' : ch === '<' ? '&lt;' : ch === '>' ? '&gt;' : ch;
        cursor.insertAdjacentHTML('beforebegin', chEscaped);
        // 滚动
        const chat = $('chatArea');
        chat.scrollTop = chat.scrollHeight;
        // 标点停顿
        if ('，。！？、；：……——'.includes(ch)) {
          await sleep(speed * 4);
        } else if (ch === '\n' || ch === ' ') {
          await sleep(0);
        } else {
          await sleep(speed);
        }
      }
    }
  }
  // 清理cursor
  cursor.remove();
  _streaming = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// 流式渲染当前场景
async function renderCurrentScene() {
  const scene = getCurrentScene();
  if (!scene) {
    goToScreen('ending');
    renderEndingReport();
    return;
  }

  _streamAbort = false;
  const charInfo = getCharInfo();

  // 更新header
  const act = SCRIPT_DATA.acts[GameState.currentAct];
  $('headerActName').textContent = act.name;
  $('headerSceneName').textContent = scene.name;
  $('headerProgress').textContent = `${GameState.currentScene+1}/${act.scenes.length}`;

  const chat = $('chatArea');
  // ★ 同一幕内不清空聊天区，追加新内容（保持连贯性）
  // 仅在换幕时由 advanceToNextScene 负责清空

  // 显示跳过按钮
  const skipBtn = $('skipBtn');
  skipBtn.classList.remove('hidden');

  // === 1. 叙事文本（逐字输出）===
  if (scene.narrativeBlock?.text) {
    let narrativeText = scene.narrativeBlock.text
      .replace(/\{playerRoleName\}/g, charInfo.name)
      .replace(/\{playerRoleTitle\}/g, charInfo.title)
      .replace(/\{playerRole\}/g, charInfo.name);

    const narrEl = document.createElement('div');
    narrEl.className = 'narrative-block streaming';
    narrEl.innerHTML = '<div class="nb-text"></div>';
    chat.appendChild(narrEl);
    await typeText(narrEl.querySelector('.nb-text'), formatText(narrativeText), 22);
    narrEl.classList.add('done');
    narrEl.classList.remove('streaming');
    if (_streamAbort) { _streamAbort = false; }
    await sleep(300);
  }

  // === 2. 对话流（逐条出现，每条逐字输出）===
  if (scene.dialogueFlow) {
    for (const d of scene.dialogueFlow) {
      if (d.cardPopup) {
        // 带卡片的对话：先流式对话文字，然后直接显示卡片
        const bubbleEl = createDialogueBubble(d, charInfo);
        chat.appendChild(bubbleEl);
        const bodyEl = bubbleEl.querySelector('.bubble-body');
        const cardHtml = d.cardPopup ? `<div class="card-popup ${d.cardPopup.type}"><strong>${d.cardPopup.title}</strong>${formatText(d.cardPopup.content)}</div>` : '';
        await typeText(bodyEl, formatText(d.text) + cardHtml, 24);
        bubbleEl.classList.add('done');
        bubbleEl.classList.remove('streaming');
      } else {
        const bubbleEl = createDialogueBubble(d, charInfo);
        chat.appendChild(bubbleEl);
        await typeText(bubbleEl.querySelector('.bubble-body'), formatText(d.text), 24);
        bubbleEl.classList.add('done');
        bubbleEl.classList.remove('streaming');
      }
      await sleep(200);
      if (_streamAbort) { _streamAbort = false; }
    }
  }

  // === 3. 玩家内心独白 ===
  if (scene.playerInnerMonologue) {
    let monoText = scene.playerInnerMonologue.text.replace(/\{playerRole\}/g, charInfo.name);
    const monoEl = document.createElement('div');
    monoEl.className = 'inner-monologue';
    chat.appendChild(monoEl);
    await typeText(monoEl, '（' + monoText + '）', 22);
    if (_streamAbort) { _streamAbort = false; }
    await sleep(200);
  }

  // === 4. 叙事过渡 ===
  if (scene.narrativeTransition) {
    const trEl = document.createElement('div');
    trEl.className = `narrative-transition${scene.narrativeTransition.suspense?' suspense':''}`;
    chat.appendChild(trEl);
    await typeText(trEl, formatText(scene.narrativeTransition.text), 20);
    if (_streamAbort) { _streamAbort = false; }
    await sleep(300);
  }

  // === 5. 续接对话流 ===
  if (scene.dialogueFlow_continued) {
    for (const d of scene.dialogueFlow_continued) {
      const bubbleEl = createDialogueBubble(d, charInfo);
      chat.appendChild(bubbleEl);
      await typeText(bubbleEl.querySelector('.bubble-body'), formatText(d.text), 24);
      bubbleEl.classList.add('done');
      bubbleEl.classList.remove('streaming');
      await sleep(200);
      if (_streamAbort) { _streamAbort = false; }
    }
  }

  // === 6. 提示块（流式输出）===
  if (scene.hintPrompt) {
    const hintEl = document.createElement('div');
    hintEl.className = 'hint-block streaming';
    hintEl.innerHTML = `<div class="hint-icon">${scene.hintPrompt.icon}</div>
      <div class="hint-content">
        <div class="hint-label">${scene.hintPrompt.label}</div>
        <div class="hint-text"></div>
      </div>`;
    chat.appendChild(hintEl);
    await typeText(hintEl.querySelector('.hint-text'), formatText(scene.hintPrompt.text), 22);
    hintEl.classList.add('done');
    hintEl.classList.remove('streaming');
    if (_streamAbort) { _streamAbort = false; }
    await sleep(200);
  }

  // === 7. 选项卡（淡入）+ 倒计时集成 ===
  if (scene.choiceCards && !GameState.choiceMade) {
    // ★ 启动倒计时系统（如果有配置）
    if (scene.timer || scene.choiceCards.timer) {
      const timerConfig = scene.timer || scene.choiceCards.timer;
      TimerManager.start({
        duration: timerConfig.remaining || timerConfig.duration || 30,
        message: timerConfig.message || '⏱️ 请在时间内做出选择',
        hint: timerConfig.hint || `超时后将<span class="highlight">自动选择</span>推荐选项`,
        overlayMode: timerConfig.overlayMode || false,
        players: timerConfig.players, // 多人模式玩家列表
        onTick: (remaining, total) => {
          // 每秒回调（可用于更新UI或其他逻辑）
          console.log(`[Timer] ${remaining}s / ${total}s`);
        },
        onTimeout: () => {
          // 超时处理：自动选择推荐选项或第一个可用选项
          handleTimeoutSelection(scene);
        }
      });
    }

    let choicesHtml = `<div class="choice-section" style="opacity:0;transition:opacity 0.5s"><div class="choice-section-title">${scene.choiceCards.title}</div>`;
    scene.choiceCards.choices.forEach(choice => {
      const locked = !checkLockCondition(choice.lockCondition);
      const prefixType = choice.prefixType || 'default';
      choicesHtml += `
        <button class="choice-btn${choice.recommended ? ' recommended' : ''}" 
                onclick="${locked ? '' : `makeChoice('${choice.id}')`}"
                ${locked ? 'disabled title="条件未满足"' : ''}
                data-id="${choice.id}">
          <div>
            <span class="choice-prefix" data-type="${prefixType}">${choice.prefixTag}</span>
          </div>
          <div class="choice-main-text">${choice.text}</div>
          ${locked ? '<div class="choice-lock-badge">🔒 需满足条件: ' + (choice.lockCondition||'') + '</div>' : ''}
        </button>`;
    });
    choicesHtml += '</div>';
    chat.insertAdjacentHTML('beforeend', choicesHtml);
    // 淡入
    requestAnimationFrame(() => {
      const cs = chat.querySelector('.choice-section:last-of-type');
      if (cs) cs.style.opacity = '1';
    });
  }

  // === 8. 任务追踪 ===
  if (scene.missionTracker) {
    chat.insertAdjacentHTML('beforeend',
      `<div class="mission-tracker">
        <span class="mt-current">📍 ${scene.missionTracker.currentObjective}</span>
        <span class="mt-overall">${scene.missionTracker.overallActMission}</span>
        <span class="mt-progress">${scene.missionTracker.progressPercent}%</span>
      </div>`);
  }

  // 隐藏跳过按钮
  skipBtn.classList.add('hidden');

  // 显示输入栏
  $('inputBar').style.display = scene.allowFreeInput && !GameState.choiceMade ? 'flex' : 'none';

  // 滚动到底部
  requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
}

// 创建对话气泡DOM（空内容，等待流式填充）
function createDialogueBubble(d, charInfo) {
  const isSelf = d.isPlayer || d.speaker?.includes('(你)');
  const el = document.createElement('div');
  el.className = `${isSelf ? 'dialogue-bubble self' : 'dialogue-bubble'} streaming`;
  el.innerHTML = `
    <div class="bubble-avatar">${d.avatar || '📜'}</div>
    <div class="bubble-content">
      <div class="bubble-name">${d.speaker}${d.mood ? ' · '+d.mood : ''}</div>
      <div class="bubble-body"></div>
    </div>`;
  return el;
}

function formatText(text) {
  if (!text) return '';
  // 保留换行，转义HTML特殊字符
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

// ---- 做出选择 ----
async function makeChoice(choiceId) {
  // ★ 停止当前倒计时（玩家已做出选择）
  TimerManager.destroy();

  const scene = getCurrentScene();
  if (!scene || !scene.choiceCards) return;

  const choice = scene.choiceCards.choices.find(c => c.id === choiceId);
  if (!choice) return;

  const charInfo = getCharInfo();
  const chat = $('chatArea');

  // 标记已选择
  GameState.choiceMade = true;

  // 隐藏选项按钮 & 跳过按钮
  const choiceSection = chat.querySelector('.choice-section');
  if (choiceSection) choiceSection.style.display = 'none';
  $('skipBtn').classList.add('hidden');

  // 1. 流式显示玩家选择气泡
  const playerBubble = document.createElement('div');
  playerBubble.className = 'dialogue-bubble self streaming';
  playerBubble.innerHTML = `
    <div class="bubble-avatar">${charInfo.avatar}</div>
    <div class="bubble-content">
      <div class="bubble-name">${charInfo.name}（你）</div>
      <div class="bubble-body" style="border-left:3px solid var(--accent-gold)"></div>
    </div>`;
  chat.appendChild(playerBubble);
  await typeText(playerBubble.querySelector('.bubble-body'), `<strong>[${choice.prefixTag}]</strong><br>${choice.text}`, 20);
  playerBubble.classList.add('done');
  playerBubble.classList.remove('streaming');

  // 2. 应用参数变化
  const changes = parseEffectPreview(choice.effectPreview);
  
  // 应用参数变化
  applyParameterChanges(changes);
  
  // ★ 数值浮窗展示（选择后以 +x分 形式弹出）
  if (Object.keys(changes).length > 0) {
    await showScorePopup(changes);
  }

  // 记录到历史
  GameState.choicesHistory.push({ scene: scene.sceneId, choice: choiceId, timestamp: Date.now() });

  // 3. 流式显示后果描述
  if (choice.consequence) {
    const isNegative = choice.consequence.includes('失败') || choice.effectPreview?.includes('-') && !choice.recommended;
    const conseqEl = document.createElement('div');
    conseqEl.className = `consequence-display${isNegative?' negative':''} streaming`;
    conseqEl.innerHTML = `<div class="conseq-title">📜 后果展开</div><div class="conseq-body"></div>`;
    chat.appendChild(conseqEl);
    await typeText(conseqEl.querySelector('.conseq-body'), formatText(choice.consequence), 22);
    conseqEl.classList.add('done');
    conseqEl.classList.remove('streaming');
  }

  // 4. 特殊效果标记
  if (choice.cinematic) {
    chat.innerHTML += `<div style="text-align:center;font-size:11px;color:var(--accent-gold);padding:4px;margin:4px 0;">✨ ${choice.cinematic} ✨</div>`;
  }
  if (choice.cpFlag) {
    chat.innerHTML += `<div style="text-align:center;font-size:11px;color:#FF69B4;padding:4px;margin:4px 0;">💕 CP线推进: ${choice.cpFlag} 💕</div>`;
  }
  if (choice.achievement) {
    chat.innerHTML += `<div style="text-align:center;font-size:11px;color:var(--accent-gold);padding:4px;margin:4px 0;">🏆 解锁成就: ${choice.achievement} 🏆</div>`;
  }

  // 5. 显示选择后事件
  if (scene.postChoiceEvent) {
    await sleep(400);
    const eventEl = document.createElement('div');
    eventEl.className = 'post-choice-event';
    eventEl.innerHTML = `<div class="event-title">${scene.postChoiceEvent.title}</div><div class="event-body"></div>`;
    chat.appendChild(eventEl);
    await typeText(eventEl.querySelector('.event-body'), formatText(scene.postChoiceEvent.content), 22);
    if (scene.postChoiceEvent.effect) {
      const postChanges = parseEffectPreview(scene.postChoiceEvent.effect);
      applyParameterChanges(postChanges);
    }
  }

  // 6. 小游戏
  if (scene.miniGame && scene.miniGame.triggerAfterChoice) {
    await sleep(600);
    renderMiniGame(scene.miniGame);
  }

  // 7. 隐藏输入框
  $('inputBar').style.display = 'none';

  // 8. 推进剧情
  await sleep(scene.postChoiceEvent ? 1800 : (scene.miniGame?.triggerAfterChoice ? 1200 : 700));
  advanceToNextScene();
}

/**
 * ★ 超时自动选择处理
 * 规则：
 * 1. 优先选择推荐选项（recommended=true）
 * 2. 如果没有推荐选项，选择第一个未锁定的选项
 * 3. 如果所有选项都锁定，跳过该场景
 */
async function handleTimeoutSelection(scene) {
  console.warn('[Timer] ⏰ 超时！执行自动选择...');
  
  if (!scene || !scene.choiceCards) return;

  const choices = scene.choiceCards.choices;
  
  // 策略1：查找推荐选项
  let autoChoice = choices.find(c => c.recommended && !checkLockCondition(c.lockCondition));
  
  // 策略2：如果没有推荐选项，找第一个可用选项
  if (!autoChoice) {
    autoChoice = choices.find(c => !checkLockCondition(c.lockCondition));
  }
  
  // 执行自动选择或跳过
  if (autoChoice) {
    console.log(`[Timer] 自动选择: ${autoChoice.id} - ${autoChoice.prefixTag}`);
    
    // 显示超时提示
    const chat = $('chatArea');
    const timeoutNotice = document.createElement('div');
    timeoutNotice.className = 'consequence-display negative streaming';
    timeoutNotice.innerHTML = `
      <div class="conseq-title">⏰ 时间到！</div>
      <div class="conseq-body"></div>
    `;
    chat.appendChild(timeoutNotice);
    
    await typeText(
      timeoutNotice.querySelector('.conseq-body'),
      `超时未做选择，系统已<span style="color:var(--accent-gold);font-weight:700">自动选择</span>：<br><strong>【${autoChoice.prefixTag}】</strong>${autoChoice.text.substring(0, 50)}...`,
      22
    );
    timeoutNotice.classList.add('done');
    timeoutNotice.classList.remove('streaming');
    
    await sleep(800);
    
    // 调用makeChoice
    await makeChoice(autoChoice.id);
  } else {
    // 所有选项都锁定，跳过场景
    console.log('[Timer] 所有选项均锁定，跳过此场景');
    GameState.choiceMade = true;
    TimerManager.destroy();
    await sleep(500);
    advanceToNextScene();
  }
}

  const paramMeta = {
    fu_yunxi: { icon: '❄️', name: '傅云夕好感度', desc: 'CP线核心参数，影响关键剧情解锁' },
    wei_rufeng: { icon: '🐺', name: '卫如风执念值', desc: '执念越高纠缠越疯狂' },
    zhou_shi: { icon: '🐍', name: '周氏', desc: '继母关系值' },
    zhuang_yushan: { icon: '🦊', name: '语山', desc: '庶姐关系值' },
    hanming: { icon: '👦🏻', name: '明哥儿信任度', desc: '弟弟的信任决定盟友质量' },
    father: { icon: '👨‍⚖️', name: '父亲关系', desc: '影响府中地位和可调动资源' },
    observation: { icon: '👁️', name: '观察力', desc: '搜证解锁隐藏线索' },
    eloquence: { icon: '🗣️', name: '口才', desc: '说服NPC/特殊话术' },
    martial: { icon: '⚔️', name: '武力', desc: 'QTE容错率/对抗' },
    wisdom: { icon: '🧠', name: '智谋', desc: '计谋选项/策略分支' },
    prestige: { icon: '👑', name: '威望', desc: '朝堂影响力/特殊权限' },
  };

  // 构建变化详情列表
  const changeDetails = [];
  for (const [displayName, delta] of Object.entries(rawChanges)) {
    const mapping = mapParamNameToKey(displayName);
    if (!mapping || !mapping.cat || !mapping.key) continue;
    const { cat, key } = mapping;
    if (!GameState.parameters[cat]?.hasOwnProperty(key)) continue;

    const oldValue = preSnapshot[`${cat}.${key}`] || 0;
    const newValue = GameState.parameters[cat][key];
    const meta = paramMeta[key] || { icon: '📊', name: displayName, desc: '' };
    
    changeDetails.push({
      key: paramKey,
      ...meta,
      oldValue, newValue, delta,
      isCritical: Math.abs(delta) >= 20,
      isSignificant: Math.abs(delta) >= 10 && Math.abs(delta) < 20
    });
  }
  
  if (changeDetails.length === 0) return; // 无变化则不展示
  
  // 生成每项HTML + 收集关系影响说明
  let itemsHtml = '';
  const relationNotes = [];
  let hasCriticalUp = false, hasCriticalDown = false;
  
  changeDetails.forEach(item => {
    const barColor = item.delta > 0 ? 'var(--accent-gold)' : (item.delta < 0 ? 'var(--accent-red)' : 'transparent');
    const barWidth = Math.max(0, Math.min(100, item.newValue));
    const deltaClass = item.delta > 0 ? 'positive' : (item.delta < 0 ? 'negative' : '');
    const deltaText = item.delta > 0 ? `+${item.delta}` : `${item.delta}`;
    const badgeHtml = item.isCritical 
      ? `<span class="vd-badge ${item.delta>0?'critical-up':'critical-down'}">${item.delta>0?'⬆重大':'⬇重大'}</span>`
      : item.isSignificant ? `<span class="vd-badge warning">显著</span>` : '';
    
    if (item.isCritical && item.delta > 0) hasCriticalUp = true;
    if (item.isCritical && item.delta < 0) hasCriticalDown = true;
    
    // 关系影响预判
    if (item.key === 'fu_yunxi_affection') {
      if (item.newValue >= 80) relationNotes.push('💕 傅云夕好感达到「深爱」级别 ✅ 满足 True End 条件之一');
      else if (item.newValue >= 50) relationNotes.push('💕 傅云夕好感进入「在意」区间');
      else if (item.newValue >= 30 && item.delta > 10) relationNotes.push('💕 傅云夕开始注意到你了...');
      else if (item.newValue < 20 && item.delta < -5) relationNotes.push('💔 傅云夕好感偏低，可能错过CP线...');
    }
    if (item.key === 'zhou_shi_hostility' && item.newValue >= 60)
      relationNotes.push('⚠️ 周氏敌意偏高，她可能会加快行动步伐');
    if (item.key === 'revenge_progress' && item.newValue >= 80)
      relationNotes.push('⚔️ 复仇进度接近目标！True End 就在眼前');
    if (item.key === 'darkness_value' && item.newValue >= 60)
      relationNotes.push('🖤 黑化值持续攀升...小心走向 Dark End');
    
    itemsHtml += `
      <div class="vd-item">
        <div class="vd-icon">${item.icon}</div>
        <div class="vd-info">
          <div class="vd-name">${item.name} ${badgeHtml}</div>
          ${item.desc ? `<div class="vd-desc">${item.desc}</div>` : ''}
        </div>
        <div class="vd-values">
          <span class="vd-old">${item.oldValue}</span>
          <span class="vd-arrow">→</span>
          <span class="vd-delta ${deltaClass}">${deltaText}</span>
          <span class="vd-new">${item.newValue}</span>
        </div>
        <div class="vd-bar-wrap"><div class="vd-bar" style="width:${barWidth}%;background:${barColor}"></div></div>
      </div>`;
  });
  
  // 总结
  const totalChanges = changeDetails.length;
  const positiveCount = changeDetails.filter(c => c.delta > 0).length;
  const negativeCount = changeDetails.filter(c => c.delta < 0).length;
  let summaryHtml = '<div class="vd-summary">';
  summaryHtml += `本次选择影响了 <strong>${totalChanges}</strong> 项参数`;
  if (positiveCount > 0) summaryHtml += `，<strong style="color:var(--accent-green)">${positiveCount}项提升</strong>`;
  if (negativeCount > 0) summaryHtml += `，<strong style="color:var(--accent-red)">${negativeCount}项下降</strong>`;
  summaryHtml += '。';
  if (hasCriticalUp) summaryHtml += '<br><strong style="color:var(--accent-green)">✨ 本次选择带来显著的正面影响！</strong>';
  if (hasCriticalDown) summaryHtml += '<br><strong style="color:var(--accent-red)">⚠️ 警告：某项数值大幅下降，可能影响后续剧情。</strong>';
  summaryHtml += '</div>';
  
  // 关系影响预判块
  const notesHtml = relationNotes.length > 0
    ? `<div class="vd-relation-note">📋 <strong>剧情影响预判：</strong><br>${relationNotes.map(n => `• ${n}`).join('<br>')}</div>` : '';
  
  // 创建面板
  const panelId = 'vd_' + Date.now();
  const panelEl = document.createElement('div');
  panelEl.className = 'value-disclosure';
  panelEl.id = panelId;
  panelEl.innerHTML = `
    <div class="vd-header" onclick="toggleVDBody('${panelId}')">
      <div class="vd-title">📊 数值变化详情 · 已披露</div>
      <div class="vd-toggle" id="${panelId}_toggle">收起 ▲</div>
    </div>
    <div class="vd-body" id="${panelId}_body">
      ${itemsHtml}
      ${summaryHtml}
      ${notesHtml}
    </div>`;
  chat.appendChild(panelEl);
  
  // 流式展开效果：先折叠→延迟展开（模拟"披露"动画）
  const bodyEl = panelEl.querySelector('.vd-body');
  bodyEl.classList.add('collapsed');
  await sleep(150);
  bodyEl.classList.remove('collapsed');
  await sleep(300);
  chat.scrollTop = chat.scrollHeight;
}

/** 切换数值面板展开/收起 */
function toggleVDBody(panelId) {
  const body = $(`${panelId}_body`);
  const toggle = $(`${panelId}_toggle`);
  if (!body || !toggle) return;
  const isCollapsed = body.classList.toggle('collapsed');
  toggle.textContent = isCollapsed ? '展开 ▼' : '收起 ▲';
}

// ---- 自由输入（AI驱动）----
async function sendUserInput() {
  const input = $('inputField');
  const text = input.value.trim();
  if (!text || _streaming) return;

  const charInfo = getCharInfo();
  const scene = getCurrentScene();
  const chat = $('chatArea');

  // 清空输入
  input.value = '';
  input.style.height = 'auto';

  // 1. 显示玩家消息（流式）
  const playerBubble = document.createElement('div');
  playerBubble.className = 'dialogue-bubble self streaming';
  playerBubble.innerHTML = `
    <div class="bubble-avatar">${charInfo.avatar}</div>
    <div class="bubble-content">
      <div class="bubble-name">${charInfo.name}（你）</div>
      <div class="bubble-body"></div>
    </div>`;
  chat.appendChild(playerBubble);
  await typeText(playerBubble.querySelector('.bubble-body'), escapeHtml(text), 20);
  playerBubble.classList.add('done');
  playerBubble.classList.remove('streaming');

  // 2. 禁用发送按钮 + typing
  $('sendBtn').disabled = true;
  const typingEl = document.createElement('div');
  typingEl.className = 'typing-indicator';
  typingEl.id = 'typingIndicator';
  typingEl.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div><span style="font-size:12px;color:var(--text-secondary);margin-left:6px;">${AI_ENABLED ? 'AI思考中...' : '思考中...'}</span>`;
  chat.appendChild(typingEl);
  chat.scrollTop = chat.scrollHeight;

  // 3. 选择响应模式：AI 或 本地模拟
  if (AI_ENABLED && AI) {
    await _aiRespond(text, scene, charInfo, chat, typingEl);
  } else {
    await _localRespond(text, scene, charInfo, chat, typingEl);
  }

  $('sendBtn').disabled = false;
  chat.scrollTop = chat.scrollHeight;
}

/** 真实AI响应 */
async function _aiRespond(userText, scene, charInfo, chat, typingEl) {
  try {
    const activeNpcId = _detectActiveNpc(scene) || 'ji_lan';
    const agent = AI.getAgent(activeNpcId);
    if (!agent) throw new Error('NPC不存在');

    const bubbleEl = createDialogueBubble(
      { speaker: agent.name, avatar: agent.avatar, mood: agent.mood },
      charInfo
    );
    bubbleEl.className += ' streaming';
    chat.appendChild(bubbleEl);
    if (typingEl) typingEl.remove();

    let fullText = '';
    const bodyEl = bubbleEl.querySelector('.bubble-body');
    const sceneContext = _buildSceneContext(scene, charInfo);

    await AI.npcRespond(activeNpcId, userText, sceneContext, GameState.parameters, {
      onChunk(chunk, accumulated) {
        bodyEl.innerHTML = formatText(accumulated);
        chat.scrollTop = chat.scrollHeight;
      },
      onDone(finalText) {
        bodyEl.innerHTML = formatText(finalText);
        bubbleEl.classList.add('done'); bubbleEl.classList.remove('streaming');
        AI.recordEvent(scene.sceneId||'free_chat', `自由对话:${userText.substring(0,30)}...`, 2);
      },
      onError(errMsg) {
        console.warn('AI错误:', errMsg);
        bodyEl.innerHTML = `<span style="color:var(--accent-red)">[连接失败] ${errMsg}<br>已切换本地模式</span>`;
        bubbleEl.classList.add('done'); bubbleEl.classList.remove('streaming');
        setTimeout(() => _localFallback(chat, userText, scene, charInfo), 1000);
      }
    });
  } catch(e) {
    console.error('AI异常:', e);
    typingEl?.remove();
    await _localFallback(chat, userText, scene, charInfo);
  }

  if (!GameState.choiceMade && scene.choiceCards) {
    await sleep(300);
    chat.insertAdjacentHTML('beforeend',
      '<div style="text-align:center;padding:12px"><span style="font-size:12px;color:var(--text-secondary)">👇 或选择选项推进剧情</span></div>');
  }
}

/** 本地模拟响应 */
async function _localRespond(userText, scene, charInfo, chat, typingEl) {
  await sleep(500 + Math.random()*400);
  if (typingEl) typingEl.remove();
  const responses = generateContextualResponse(userText, scene, charInfo);
  for (const resp of responses) {
    const el = createDialogueBubble(resp, charInfo);
    chat.appendChild(el);
    await typeText(el.querySelector('.bubble-body'), formatText(resp.text), 24);
    el.classList.add('done'); el.classList.remove('streaming');
    await sleep(200);
  }
  if (!GameState.choiceMade && scene.choiceCards) {
    await sleep(300);
    chat.insertAdjacentHTML('beforeend',
      '<div style="text-align:center;padding:12px"><span style="font-size:12px;color:var(--text-secondary)">👇 或选择选项推进剧情</span></div>');
  }
}

/** AI失败fallback */
async function _localFallback(chat, userText, scene, charInfo) {
  const responses = generateContextualResponse(userText, scene, charInfo);
  for (const resp of responses) {
    const el = createDialogueBubble(resp, charInfo);
    chat.appendChild(el);
    await typeText(el.querySelector('.bubble-body'), formatText(resp.text), 24);
    el.classList.add('done'); el.classList.remove('streaming');
    await sleep(150);
  }
}

/** 检测当前场景的活跃NPC */
function _detectActiveNpc(scene) {
  if (!scene.dialogueFlow) return 'ji_lan';
  for (let i = scene.dialogueFlow.length-1; i >= 0; i--) {
    const d = scene.dialogueFlow[i];
    if (!d.isPlayer && !d.speaker?.includes('(你)')) {
      return {'汲蓝':'ji_lan','姝红':'shu_hong','陈妈妈':'chen_mama',
        '傅云夕':'fu_yunxi','周氏':'zhou_shi','庄语山':'zhuang_yushan',
        '卫如风':'wei_rufeng','明哥儿':'hanming'}[d.speaker] || 'ji_lan';
    }
  }
  return 'ji_lan';
}

/** 构建场景上下文 */
function _buildSceneContext(scene, charInfo) {
  return [
    `当前场景: ${scene.name}`,
    `扮演角色: ${charInfo.name}（${charInfo.title}）`,
    scene.narrativeBlock?.text ? `环境: ${scene.narrativeBlock.text.substring(0,150)}` : '',
    scene.hintPrompt?.text ? `情况: ${scene.hintPrompt.text.substring(0,120)}` : ''
  ].filter(Boolean).join('\n');
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendUserInput();
  }
  // 自动调整高度
  const field = e.target;
  field.style.height = 'auto';
  field.style.height = Math.min(field.scrollHeight, 80) + 'px';
}

/**
 * 基于用户输入生成上下文相关的智能响应
 * 这是核心函数——根据场景上下文+用户输入+角色信息生成合理的回复
 */
function generateContextualResponse(userText, scene, charInfo) {
  const text = userText.toLowerCase().trim();
  const responses = [];

  // 1. 优先使用场景内置的AI响应模式
  if (scene.aiResponses && scene.aiResponses.patterns) {
    for (const pattern of scene.aiResponses.patterns) {
      if (pattern.keywords.some(kw => text.includes(kw))) {
        return pattern.responses.map(r => ({...r}));
      }
    }
    // 匹配默认响应
    if (scene.aiResponses.defaultResponse) {
      return [scene.aiResponses.defaultResponse];
    }
  }

  // 2. 通用智能响应（基于输入内容分析）
  const charName = charInfo.name;

  // 分析用户输入的情绪/意图
  if (/(生气|愤怒|混蛋|滚|该死|杀了)/.test(text)) {
    responses.push(
      { speaker: '系统旁白', avatar: '📜', text: `你的情绪明显激动了起来。在场的人都感受到了你身上散发出的压迫感。`, isNarration: true },
      { speaker: scene.dialogueFlow?.slice(-1)[0]?.speaker || 'NPC', avatar: scene.dialogueFlow?.slice(-1)[0]?.avatar || '😲', text: `（${charName}的反应出乎意料地激烈......）`, mood: '震惊' }
    );
  } else if (/(哭|泪|难过|伤心|痛苦|委屈)/.test(text)) {
    responses.push(
      { speaker: '系统旁白', avatar: '📜', text: `你忍不住红了眼眶，声音也带了哽咽。`, isNarration: true },
      { speaker: '陈妈妈', avatar: '👵🏻', text: `（心疼地）姑娘......莫要难过，老奴在这里呢。`, mood: '安慰' }
    );
  } else if (/(笑|好笑|可笑|哼|冷笑)/.test(text)) {
    responses.push(
      { speaker: '系统旁白', avatar: '📜', text: `你的嘴角勾起一抹意味深长的弧度。`, isNarration: true },
      { speaker: scene.dialogueFlow?.find(d => d.avatar==='🦊')?.speaker || '庄语山', avatar: '🦊', text: `你笑什么？有什么好笑的吗？`, mood: '不悦' }
    );
  } else if (/(问|谁|什么|为什么|怎么|为何)/.test(text)) {
    responses.push(
      { speaker: scene.dialogueFlow?.find(d => !d.isPlayer)?.speaker || 'NPC', avatar: scene.dialogueFlow?.find(d => !d.isPlayer)?.avatar || '📜', text: `这个问题......（对方似乎犹豫了一下）`, mood: '迟疑' }
    );
  } else if (text.length > 15) {
    // 较长的输入 → 视为主动行动/发言
    responses.push(
      { speaker: '系统旁白', avatar: '📜', text: `你说道：「${userText}」\n\n这番话让周围的气氛发生了一些变化......`, isNarration: true },
      { speaker: '汲蓝', avatar: '👧🏻', text: `（小声）小姐说得有道理......`, mood: '赞同' },
      { speaker: '系统旁白', avatar: '📜', text: `💡 你也可以点击下方的选项来推进剧情，这样会有更明确的效果哦。`, isNarration: true }
    );
  } else {
    // 短输入 → 简短互动
    responses.push(
      { speaker: '系统旁白', avatar: '📜', text: `你简短地回应了一句。对方似乎还在等待你更多的表示......\n\n💡 尝试输入更多内容，或者使用下方选项来做正式选择。`, isNarration: true }
    );
  }

  // 3. 给予少量随机奖励（智谋提升）
  if (Math.random() > 0.7) {
    GameState.parameters.skills.wisdom = Math.min(100, GameState.parameters.skills.wisdom + 1);
    renderParamBar();
  }

  return responses;
}

function renderMiniGame(miniGame) {

  GameState.miniGameActive = true;

  chat.innerHTML += `
    <div class="mini-game-section">
      <div class="mini-game-header">🎮 ${miniGame.name}</div>
      <div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">${miniGame.rules.description}</div>
      <div class="mini-game-options">
        ${miniGame.rules.options.map(opt => `
          <div class="mini-game-option" onclick="completeMiniGame('${opt.id}', '${JSON.stringify(opt.reward).replace(/'/g,"&#39;")}')">
            <span class="mg-icon">${opt.icon}</span>
            <span>${opt.text}</span>
          </div>
        `).join('')}
      </div>
    </div>`;

  chat.scrollTop = chat.scrollHeight;
}

function completeMiniGame(optionId, rewardJson) {
  const reward = JSON.parse(rewardJson);
  const chat = $('chatArea');

  // 应用奖励（适配新参数结构）
  Object.keys(reward).forEach(key => {
    if (key === 'trust' || key === 'bond') {
      GameState.parameters.affection.hanming = Math.min(1000, GameState.parameters.affection.hanming + reward[key]);
      highlightParamChange('affection', 'hanming', reward[key]);
    } else if (key === 'wisdom') {
      GameState.parameters.skills.wisdom = Math.min(100, GameState.parameters.skills.wisdom + reward[key]);
      highlightParamChange('skills', 'wisdom', reward[key]);
    } else if (key === 'courage' || key === 'martial') {
      GameState.parameters.skills.martial = Math.min(100, GameState.parameters.skills.martial + reward[key]);
      highlightParamChange('skills', 'martial', reward[key]);
    } else if (reward[key]) {
      // 默认给智谋
      GameState.parameters.skills.wisdom = Math.min(100, GameState.parameters.skills.wisdom + 5);
    }
  });
  renderParamBar();

  // 移除小游戏区域
  const mgSection = chat.querySelector('.mini-game-section');
  if (mgSection) mgSection.innerHTML = `<div class="consequence-display"><div class="conseq-title">🎉 承诺达成！</div><div class="conseq-body">你们的羁绊更加深厚了。</div></div>`;

  GameState.miniGameActive = false;

  // 继续推进
  setTimeout(() => advanceToNextScene(), 1000);
}

// ---- 剧情推进 ----
function advanceToNextScene() {
  const act = SCRIPT_DATA.acts[GameState.currentAct];
  if (!act) {
    goToScreen('ending');
    renderEndingReport();
    return;
  }

  // 强制中断当前流式
  _streamAbort = true; _streaming = false;
  
  const scene = act.scenes[GameState.currentScene];

  // 检查是否有幕结束报告
  if (scene.actEndingReport) {
    showActEnding(act, scene.actEndingReport);
    return;
  }

  // 同一幕内场景切换：无缝衔接，无loading
  if (GameState.currentScene < act.scenes.length - 1) {
    GameState.currentScene++;
    GameState.choiceMade = false;
    _streamAbort = false; _streaming = false;
    renderCurrentScene().catch(e => console.error('场景渲染错误:', e));
  } else if (GameState.currentAct < SCRIPT_DATA.acts.length - 1) {
    // 幕切换：轻量过渡 + 清空聊天区
    const nextAct = SCRIPT_DATA.acts[GameState.currentAct + 1];
    showSceneTransition(act.name, `下一幕：${nextAct.name}`);
    setTimeout(() => {
      $('chatArea').innerHTML = ''; // 换幕时才清空
      GameState.currentAct++;
      GameState.currentScene = 0;
      GameState.choiceMade = false;
      _streamAbort = false; _streaming = false;
      renderCurrentScene().catch(e => console.error('场景渲染错误:', e));
    }, 1200);
  } else {
    goToScreen('ending');
    renderEndingReport();
  }
}

function showSceneTransition(title, sub) {
  const overlay = $('sceneOverlay');
  $('overlayText').textContent = title;
  overlay.querySelector('.scene-overlay-sub').textContent = sub;
  overlay.classList.add('active');
  setTimeout(() => overlay.classList.remove('active'), 2000);
}

function showActEnding(act, reportData) {
  const chat = $('chatArea');

  chat.innerHTML += `
    <div class="act-ending-report">
      <div class="aer-title">${reportData.content.title}</div>
      <div class="aer-summary">${reportData.content.summary}</div>
      ${reportData.content.nextActPreview ? `
        <div class="aer-next">
          <strong>${reportData.content.nextActPreview.actName}</strong><br>
          ${reportData.content.nextActPreview.keyEvents.map(e => '• '+e).join('<br>')}
        </div>` : ''}
    </div>`;

  chat.scrollTop = chat.scrollHeight;

  // 自动推进到下一幕
  setTimeout(() => {
    if (GameState.currentAct < SCRIPT_DATA.acts.length - 1) {
      $('chatArea').innerHTML = ''; // 换幕清空
      GameState.currentAct++;
      GameState.currentScene = 0;
      GameState.choiceMade = false;
      _streamAbort = false; _streaming = false;
      renderCurrentScene().catch(e => console.error('场景渲染错误:', e));
    } else {
      goToScreen('ending');
      renderEndingReport();
    }
  }, 3500);
}

  else if (params.fu_yunxi_affection >= 50 && params.revenge_progress >= 50) endingType = 'good_end';

  const endings = {
    true_end: { badge: '🌸', title: 'True End · 重生花开', subtitle: '你拥有了完整的人生' },

  const fates = [
    { avatar: '❄️', name: '傅云夕', fate: endingType==='dark_end'?'失望离去':'终身伴侣' },
    { avatar: '👦🏻', name: '庄寒明', fate: '成才成人' },
    { avatar: '👵🏻', name: '陈妈妈', fate: '安享晚年' },
    { avatar: '👧🏻', name: '汲蓝&姝红', fate: '幸福美满' },
    { avatar: '🐍', name: '周氏', fate: endingType.includes('dark')?'被你处置':'别院赎罪' },

    { avatar: '🐺', name: '卫如风', fate: '流放病亡' },

/** 模板结局叙事（无API时使用） */
function _getTemplateNarrative(type) {
  const t = {

    dark_end: '所有人都跪在你面前，瑟瑟发抖。\n\n你居高临下地看着他们——曾经欺辱你的人、背叛你的人、伤害你的人。如今，他们都在你的脚下颤抖。\n\n"求求您......饶命......"周氏的声音嘶哑破碎。\n\n你没有说话，只是微微抬了抬眼皮。下一刻，她就被拖了下去。\n\n你赢了。彻彻底底地赢了。\n\n只是......为什么心里空荡荡的？那个曾经说要护你一生的人，此刻正站在人群之外，用一种你从未见过的眼神看着你。\n\n失望？恐惧？还是......悲哀？',
    good_end: '春暖花开时节，你坐在廊下看书。\n\n明哥儿已经长高了，正在院子里练字。汲蓝和姝红在一旁说着悄悄话，时不时发出笑声。陈妈妈端着茶点走来，脸上的皱纹里都是慈祥。\n\n一切都很安静，很美好。\n\n前世那些痛苦的记忆，仿佛已经是上辈子的事了。你深吸一口气，闻到了花香。\n\n这一世，活得很好。',
    bad_end: '你又回到了原点。\n\n睁开眼的时候，还是那间偏殿，还是那盏孤灯。所有的一切努力，似乎都付诸东流。\n\n不......不对。\n\n你还记得这一切。记得那些人的脸，记得那些话，记得那些痛。\n\n你握紧了拳头。这一次，你不会再犯同样的错了。\n\n窗外，雪又开始下了。',
    normal_end: '故事还没有结束。\n\n前方还有很多未知在等着你。但你已经不再是当初那个任人摆布的小姑娘了。\n\n你抬起头，迎着阳光走去。\n\n不管未来如何，至少这一次，命运掌握在自己手里。'
  };

}

function renderRelationGraph() {
  const container = $('relationGraph');
  const w = container.offsetWidth, h = container.offsetHeight;
  const cx = w/2, cy = h/2;

  const nodes = [
    {id:'player',label:getCharInfo()?.name||'我',emoji:getCharInfo()?.avatar||'🌸',x:cx,y:cy,cls:'player'},
    {id:'fu',label:'傅云夕',emoji:'❄️',x:cx+80,y:cy-60,cls:'love'},
    {id:'wei',label:'卫如风',emoji:'🐺',x:cx-90,y:cy-40,cls:'enemy'},
    {id:'zhou',label:'周氏',emoji:'🐍',x:cx-70,y:cy+60,cls:'enemy'},
    {id:'yu',label:'语山',emoji:'🦊',x:cx+70,y:cy+65,cls:'enemy'},
    {id:'han',label:'明哥儿',emoji:'👦🏻',x:cx-30,y:cy-85,cls:'ally'},
    {id:'chen',label:'陈妈妈',emoji:'👵🏻',x:cx+100,y:cy+20,cls:'ally'},
    {id:'yunni',label:'郡主',emoji:'👸🏻',x:cx,y:cy+95,cls:'neutral'}
  ];

  const aff = GameState.parameters.affection.fu_yunxi;
  const edges = [
    {from:'player',to:'fu',label:aff>=70?'深爱':aff>=40?'在意':'初见',color:'#FF69B4',dashed:false,w:Math.max(1,aff/20)},
    {from:'player',to:'wei',label:'仇敌',color:'#FF0000',dashed:true,w:1.5},
    {from:'player',to:'zhou',label:'复仇',color:'#8B0000',dashed:false,w:Math.max(1,Math.abs(GameState.parameters.affection.zhou_shi)/25)},
    {from:'player',to:'yu',label:'宿敌',color:'#FF4500',dashed:true,w:1.5},
    {from:'player',to:'han',label:'姐弟',color:'#FFD700',dashed:true,w:GameState.parameters.affection.hanming/30},
    {from:'fu',to:'wei',label:'对立',color:'#666666',dashed:true,w:1},
    {from:'zhou',to:'yu',label:'母女',color:'#228B22',dashed:false,w:1.5}
  ];

  let svg = `<svg width="${w}" height="${h}" style="position:absolute;top:0;left:0">`;
  edges.forEach(e => {
    const n1=nodes.find(n=>n.id===e.from), n2=nodes.find(n=>n.id===e.to);
    if(!n1||!n2) return;
    svg+=`<line x1="${n1.x}"y1="${n1.y}"x2="${n2.x}"y2="${n2.y}"stroke="${e.color}"stroke-width="${e.w}"${e.dashed?' stroke-dasharray="4,4"':''} opacity="0.6"/>`;
    const mx=(n1.x+n2.x)/2, my=(n1.y+n2.y)/2;
    svg+=`<text x="${mx}"y="${my-2}"fill="${e.color}"font-size="9"text-anchor="middle"opacity="0.8">${e.label}</text>`;
  });
  svg+='</svg>';

  let nodesHtml = nodes.map(n=>`
    <div class="graph-node ${n.cls}" style="left:${n.x-22}px;top:${n.y-22}px">${n.emoji}</div>
    <div class="graph-label" style="left:${n.x}px;top:${n.y+26}px">${n.label}</div>
  `).join('');
  container.innerHTML = svg + nodesHtml;
}

          <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:4px">API Key</label>
          <input id="cfgApiKey" type="password" value="${savedKey}" placeholder="输入你的 API Key..."
            style="width:100%;padding:10px;background:var(--bg-primary);border:1px solid var(--choice-border);border-radius:8px;color:var(--text-primary);font-size:13px;box-sizing:border-box">
        </div>

        <div style="display:flex;gap:8px">
          <button onclick="saveAPIConfig()" style="flex:1;padding:10px;background:var(--accent-gold);color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px">✅ 保存并启用</button>
          <button onclick="testAPIConnection()" style="flex:1;padding:10px;background:transparent;color:var(--accent-gold);border:1px solid var(--accent-gold);border-radius:8px;cursor:pointer;font-size:13px">🔗 测试连接</button>
        </div>

        <div id="apiTestResult" style="margin-top:10px;font-size:12px;text-align:center;display:none"></div>

        <div style="margin-top:14px;padding:10px;background:rgba(201,169,110,0.08);border-radius:8px;font-size:11px;color:var(--text-secondary);line-height:1.6">
          💡 <b>AI功能说明：</b><br>
          • 配置后，自由输入将调用真实大模型生成NPC回复<br>
          • NPC具备完整人设+长期记忆，不会OOC<br>
          • 结局会根据你的所有选择动态个性化生成<br>
          • 不配置也可游玩，使用本地模拟模式
        </div>
      </div>
    </div>`;
  document.body.appendChild(panel);
}

function saveAPIConfig() {
  const key = $('cfgApiKey').value.trim();
  const url = $('cfgApiUrl').value.trim();
  const model = $('cfgModel').value.trim();

  localStorage.setItem('novelworld_api_key', key);
  localStorage.setItem('novelworld_api_url', url);
  localStorage.setItem('novelworld_api_model', model);

  initAISystem({ apiKey: key, baseUrl: url, model });
  
  $('apiConfigPanel').remove();
  
  // 显示状态提示
  const chat = $('chatArea');
  if (chat && AI_ENABLED) {
    chat.insertAdjacentHTML('beforeend',
      `<div style="text-align:center;padding:10px;color:var(--accent-green);font-size:12px">
        🧠 AI智能体已启用！NPC现在拥有真实记忆和人格
      </div>`);
  }
}

async function testAPIConnection() {
  const resultEl = $('apiTestResult');
  resultEl.style.display = 'block';
  resultEl.style.color = 'var(--text-secondary)';
  resultEl.textContent = '⏳ 测试中...';

  const key = $('cfgApiKey').value.trim();
  const url = $('cfgApiUrl').value.trim();
  const model = $('cfgModel').value.trim() || 'glm-4-flash';

  if (!key) {
    resultEl.style.color = 'var(--accent-red)';
    resultEl.textContent = '❌ 请先填写 API Key';
    return;
  }

  try {
    const testClient = new AIApiClient({ apiKey: key, baseUrl: url, model, maxTokens: 20 });
    const resp = await testClient.chat([
      { role: 'user', content: '说"连接成功"' }
    ], { stream: false });

    resultEl.style.color = 'var(--accent-green)';
    resultEl.textContent = `✅ 连接成功！响应: "${resp.substring(0,30)}..."`;
  } catch(e) {
    resultEl.style.color = 'var(--accent-red)';
    resultEl.textContent = `❌ 连接失败: ${e.message}`;
  }
}

// 页面加载时尝试初始化AI
(function() {
  const savedKey = localStorage.getItem('novelworld_api_key') || '';
  const savedUrl = localStorage.getItem('novelworld_api_url') || '';
  const savedModel = localStorage.getItem('novelworld_api_model') || '';
  if (savedKey) {
    initAISystem({ apiKey: savedKey, baseUrl: savedUrl, model: savedModel });
  } else {
    initAISystem({});
  }
})();
</script>
</body>
</html>
